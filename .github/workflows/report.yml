name: Stock Report

on:
  workflow_dispatch:
    inputs:
      kind:
        type: choice
        description: 'Report type'
        options:
          - position
          - market
        default: position

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate and Send
        run: |
          node -e "
const {execSync}=require('child_process');
const https=require('https');
const kind='${{ github.event.inputs.kind }}';
const title=kind==='position'?'Position Report':'Market Report';
const cmd=kind==='position'?'python daily_stock_analysis.py':'python daily_market_analysis.py';
const text=execSync(cmd,{encoding:'utf8'});
const payload=JSON.stringify({msgtype:'text',text:{content:title+'\\n'+text}});
const u=new URL(process.env.WEBHOOK);
const req=https.request({hostname:u.hostname,path:u.pathname+u.search,method:'POST',headers:{'Content-Type':'application/json'}},r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>console.log(r.statusCode,d));});
req.on('error',e=>console.error(e.message));
req.write(payload);
req.end();
"
        env:
          WEBHOOK: ${{ secrets.WEBHOOK_URL }}
